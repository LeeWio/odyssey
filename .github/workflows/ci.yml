name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "plans/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "plans/**"
      - ".gitignore"
      - "LICENSE"

permissions:
  contents: read

jobs:
  static-checks:
    name: Lint & Formatting
    runs-on: ubuntu-latest
    env:
      HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Verify Code Formatting
        run: bun x prettier --check .

      - name: Run Linter
        run: bun run lint

  build-and-audit:
    name: Production Build & Web Vitals Audit
    runs-on: ubuntu-latest
    env:
      HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Cache Next.js Build
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Vercel-recommended high-performance GHA cache key strategy
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-

      - name: Run Production Build
        run: bun run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json

      - name: Upload Lighthouse Reports Artifact
        uses: actions/upload-artifact@v4
        if: always() # Run even if assertions fail, allowing developers to download and inspect HTML reports
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 7
