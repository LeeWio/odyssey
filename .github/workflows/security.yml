name: Security Audit

on:
  push:
    branches: [main, master]
    paths:
      - "bun.lock"
      - "package.json"
      - ".github/workflows/security.yml"
  schedule:
    # Run every night at midnight UTC
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup environment (Skip dependency installation to save precious CI minutes)
      - name: Setup Project Environment
        uses: ./.github/actions/setup-project
        with:
          install-deps: "false"

      # Perform a blazing fast native Bun Scan
      - name: Run Fast Native Bun Scan
        run: bun pm scan

      # Generate temporary lockfile for audit-ci compatibility
      - name: Generate Temporary Lockfile for Auditing
        run: bun install --yarn

      # Perform deep, strict security threshold checking
      - name: Run Deep Dependency Security Audit (audit-ci)
        run: bun x audit-ci --high
