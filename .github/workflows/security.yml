name: Security Audit

on:
  push:
    branches: [main, master]
  schedule:
    # Run every night at midnight UTC
    - cron: "0 0 * * *"

jobs:
  audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          bun-download-url: "https://github.com/oven-sh/bun/releases/latest/download/bun-${{ runner.os == 'macOS' && 'darwin' || (runner.os == 'Windows' && 'windows' || 'linux') }}-${{ runner.arch == 'X64' && 'x64' || 'aarch64' }}.zip"

      - name: Generate Temporary Lockfile for Auditing
        run: bun install --yarn

      - name: Run Dependency Security Audit
        run: bun x audit-ci --high
