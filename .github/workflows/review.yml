name: "Code Quality PR Reviewer"

on:
  pull_request:
    branches: ["main", "master"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "plans/**"
      - ".gitignore"

permissions:
  contents: read
  pull-requests: write # Required for Reviewdog to post comments on the PR diff!

jobs:
  eslint-review:
    name: ESLint Inline Review
    runs-on: ubuntu-latest
    env:
      HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup Bun and dependencies (Reviewdog needs eslint to be installed to run it)
      - name: Setup Project
        uses: ./.github/actions/setup-project

      # 2. Run Reviewdog ESLint to automatically comment on PR changes
      - name: Run ESLint with Reviewdog
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Post comments directly on the PR line-by-line diff as a review
          reporter: github-pr-review
          # Run check on all files or just changed ones (Reviewdog handles filtering to PR diff automatically)
          eslint_flags: "."
