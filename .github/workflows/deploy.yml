name: Odyssey Frontend Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: odyssey-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Odyssey Web
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_SHA: ${{ github.sha }}
          PROJECT_PATH: ${{ secrets.SERVER_PROJECT_PATH || '/srv/blog' }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}

          envs: DEPLOY_SHA,PROJECT_PATH,HEALTHCHECK_URL

          command_timeout: 30m

          script: |
            #!/usr/bin/env bash

            # -e: 任一命令失败时立即退出
            # -u: 使用未定义变量时退出
            # pipefail: 管道中任一命令失败都视为失败
            set -Eeuo pipefail

            on_error() {
              local exit_code=$?
              local line_number=${1:-unknown}

              echo
              echo "================================================"
              echo "Deployment failed"
              echo "Exit code : ${exit_code}"
              echo "Line      : ${line_number}"
              echo "Commit    : ${DEPLOY_SHA}"
              echo "================================================"

              exit "${exit_code}"
            }

            trap 'on_error $LINENO' ERR

            log() {
              printf '\n[%s] %s\n' "$(date '+%Y-%m-%d %H:%M:%S')" "$*"
            }

            retry() {
              local max_attempts="$1"
              local delay="$2"
              shift 2

              local attempt=1

              until "$@"; do
                if [ "${attempt}" -ge "${max_attempts}" ]; then
                  echo "Command failed after ${max_attempts} attempts: $*"
                  return 1
                fi

                echo "Attempt ${attempt}/${max_attempts} failed."
                echo "Retrying in ${delay} seconds..."

                sleep "${delay}"
                attempt=$((attempt + 1))
              done
            }

            WEB_PATH="${PROJECT_PATH}/apps/web"

            log "Validating deployment environment"

            if [ ! -d "${PROJECT_PATH}" ]; then
              echo "Project path does not exist: ${PROJECT_PATH}"
              exit 1
            fi

            if [ ! -d "${WEB_PATH}/.git" ]; then
              echo "Git repository does not exist: ${WEB_PATH}"
              exit 1
            fi

            if [ ! -f "${PROJECT_PATH}/compose.yaml" ] &&
               [ ! -f "${PROJECT_PATH}/compose.yml" ] &&
               [ ! -f "${PROJECT_PATH}/docker-compose.yaml" ] &&
               [ ! -f "${PROJECT_PATH}/docker-compose.yml" ]; then
              echo "Docker Compose configuration was not found in:"
              echo "${PROJECT_PATH}"
              exit 1
            fi

            command -v git >/dev/null 2>&1 || {
              echo "git is not installed"
              exit 1
            }

            command -v docker >/dev/null 2>&1 || {
              echo "docker is not installed"
              exit 1
            }

            docker compose version >/dev/null 2>&1 || {
              echo "Docker Compose v2 is not available"
              exit 1
            }

            log "Synchronizing repository"

            cd "${WEB_PATH}"

            # 删除可能由异常中断遗留的锁文件。
            rm -f .git/index.lock
            rm -f .git/packed-refs.lock
            rm -f .git/refs/remotes/origin/main.lock

            # 只拉取 main，而不是 fetch --all。
            # fetch --all 会访问所有 remote，不适合生产部署。
            retry 3 5 \
              git fetch \
                --prune \
                --no-tags \
                origin \
                "+refs/heads/main:refs/remotes/origin/main"

            # GitHub push 事件中的 github.sha 是触发本次部署的准确提交。
            # 不直接部署模糊的“当前 origin/main”。
            if ! git cat-file -e "${DEPLOY_SHA}^{commit}" 2>/dev/null; then
              echo "Deployment commit was not fetched: ${DEPLOY_SHA}"
              exit 1
            fi

            if ! git merge-base --is-ancestor \
              "${DEPLOY_SHA}" \
              "origin/main"; then
              echo "Commit ${DEPLOY_SHA} is not part of origin/main"
              exit 1
            fi

            git reset --hard "${DEPLOY_SHA}"
            git clean -fd

            CURRENT_SHA="$(git rev-parse HEAD)"

            if [ "${CURRENT_SHA}" != "${DEPLOY_SHA}" ]; then
              echo "Commit verification failed"
              echo "Expected: ${DEPLOY_SHA}"
              echo "Actual  : ${CURRENT_SHA}"
              exit 1
            fi

            log "Repository synchronized to ${CURRENT_SHA}"

            cd "${PROJECT_PATH}"

            log "Validating Docker Compose configuration"

            docker compose config --quiet

            # 限制 Compose 同时构建多个服务。
            # 注意：这不是严格的 CPU 或内存限制。
            export COMPOSE_PARALLEL_LIMIT=1
            export BUILDKIT_STEP_LOG_MAX_SIZE=1048576

            log "Building web image"

            # 先构建，构建成功前不会影响当前运行中的旧容器。
            # --pull 会检查基础镜像是否有更新。
            nice -n 10 docker compose build --pull web

            log "Starting web service"

            docker compose up \
              -d \
              --no-deps \
              --remove-orphans \
              web

            log "Waiting for web container"

            CONTAINER_ID="$(docker compose ps -q web)"

            if [ -z "${CONTAINER_ID}" ]; then
              echo "Unable to resolve the web container ID"
              exit 1
            fi

            HEALTHY=false

            for attempt in $(seq 1 30); do
              RUNNING="$(
                docker inspect \
                  --format '{{.State.Running}}' \
                  "${CONTAINER_ID}"
              )"

              STATUS="$(
                docker inspect \
                  --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' \
                  "${CONTAINER_ID}"
              )"

              echo "Health check ${attempt}/30: running=${RUNNING}, health=${STATUS}"

              if [ "${RUNNING}" != "true" ]; then
                echo "Web container stopped unexpectedly"
                docker compose logs --tail=200 web
                exit 1
              fi

              if [ "${STATUS}" = "healthy" ] ||
                 [ "${STATUS}" = "none" ]; then
                HEALTHY=true
                break
              fi

              if [ "${STATUS}" = "unhealthy" ]; then
                echo "Web container is unhealthy"
                docker compose logs --tail=200 web
                exit 1
              fi

              sleep 2
            done

            if [ "${HEALTHY}" != "true" ]; then
              echo "Web container did not become healthy in time"
              docker compose logs --tail=200 web
              exit 1
            fi

            if [ -n "${HEALTHCHECK_URL:-}" ]; then
              log "Checking application endpoint"

              retry 10 3 \
                curl \
                  --fail \
                  --silent \
                  --show-error \
                  --location \
                  --max-time 10 \
                  "${HEALTHCHECK_URL}" \
                  --output /dev/null
            fi

            log "Cleaning unused Docker resources"

            # 仅清理悬空镜像。
            docker image prune --force

            # 清理 7 天前未使用的构建缓存，避免每次发布都删除近期缓存。
            docker builder prune \
              --force \
              --filter "until=168h"

            log "Deployment completed successfully"

            echo "Commit    : ${CURRENT_SHA}"
            echo "Container : ${CONTAINER_ID}"
            docker compose ps web