name: Odyssey Frontend Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Navigate to the Web repository directory on the server
            cd ${{ secrets.SERVER_PROJECT_PATH || '/srv/blog' }}/apps/web
            
            # Pull the latest frontend code
            git pull
            
            # Navigate to the root directory containing the compose.yaml file
            cd ${{ secrets.SERVER_PROJECT_PATH || '/srv/blog' }}
            
            # Rebuild and restart only the Web service container
            docker compose up -d --build web
