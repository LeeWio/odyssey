name: Odyssey Frontend Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # 1. Clear any leftover git lockfiles to unlock git operations on the server
            rm -f ${{ secrets.SERVER_PROJECT_PATH || '/srv/blog' }}/apps/web/.git/index.lock
            rm -f ${{ secrets.SERVER_PROJECT_PATH || '/srv/blog' }}/apps/web/.git/refs/remotes/origin/main.lock

            # 2. Navigate to the Web directory and force-sync with remote origin/main
            cd ${{ secrets.SERVER_PROJECT_PATH || '/srv/blog' }}/apps/web
            git fetch --all
            git reset --hard origin/main

            # 3. Navigate to the root directory containing compose.yaml
            cd ${{ secrets.SERVER_PROJECT_PATH || '/srv/blog' }}

            # 4. Force-stop and remove any conflicting or orphaned web containers
            docker compose rm -fs web || true

            # 5. Rebuild and restart the Web container with force recreation
            docker compose up -d --build --force-recreate web
