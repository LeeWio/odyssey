name: Odyssey Frontend Deploy

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "plans/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/security.yml"
      - ".github/workflows/release.yml"
      - ".gitignore"

concurrency:
  group: odyssey-production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    name: Build & Push Docker Image to GHCR
    runs-on: ubuntu-latest
    env:
      HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup Node/Bun and install dependencies with native cache
      - name: Setup Project Environment
        uses: ./.github/actions/setup-project

      # 2. Run static validation to ensure bad builds never go to production
      - name: Verify Code Quality
        run: |
          bun x prettier --check .
          bun run lint

      # 3. Restore Next.js cache and compile standalone build on the host runner
      - name: Cache Next.js Build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-

      - name: Compile Next.js Standalone Application
        run: bun run build

      # 4. Set up Docker Buildx and login to GHCR
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Pack prebuilt standalone files into the ultra-lean runner-prebuilt target stage (takes ~5s)
      - name: Package Prebuilt Output & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner-prebuilt
          push: true
          tags: |
            ghcr.io/leewio/odyssey-web:latest
            ghcr.io/leewio/odyssey-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-server:
    name: Pull & Recreate Container on Server
    needs: build-and-push-image
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://blog.wei.li
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          # Pass temporary GHA secrets and custom health check urls to the SSH session
          envs: GITHUB_TOKEN,GITHUB_ACTOR,HEALTHCHECK_URL
          command_timeout: 15m
          script: |
            #!/usr/bin/env bash
            set -Eeuo pipefail

            log() {
              printf '\n[%s] %s\n' "$(date '+%Y-%m-%d %H:%M:%S')" "$*"
            }

            # 1. Navigate to the root directory containing compose.yaml
            log "Navigating to compose directory..."
            cd ${{ secrets.SERVER_PROJECT_PATH || '/srv/blog' }}

            # 2. Login to ghcr.io with the ephemeral GITHUB_TOKEN passed from GHA
            log "Logging in to GitHub Container Registry on production server..."
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # 3. Pull the precompiled image from GHCR
            log "Pulling the latest precompiled web image from registry..."
            docker compose pull web

            # 4. Gracefully recreate the Web container with zero-downtime rolling restart (no compiling!)
            log "Recreating Web container..."
            docker compose up -d --no-deps web

            # 5. Logout of GHCR to protect server credentials
            docker logout ghcr.io

            # 6. Advanced Post-Deployment Verification (imported from remote repository commits)
            log "Verifying container status..."
            CONTAINER_ID="$(docker compose ps -q web)"

            if [ -z "${CONTAINER_ID}" ]; then
              echo "Web container ID could not be resolved"
              exit 1
            fi

            READY=false

            for attempt in $(seq 1 30); do
              RUNNING="$(
                docker inspect \
                  --format '{{.State.Running}}' \
                  "${CONTAINER_ID}"
              )"

              HEALTH="$(
                docker inspect \
                  --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' \
                  "${CONTAINER_ID}"
              )"

              echo "Check ${attempt}/30: running=${RUNNING}, health=${HEALTH}"

              if [ "${RUNNING}" != "true" ]; then
                echo "Web container stopped unexpectedly"
                docker compose logs --tail=200 web
                exit 1
              fi

              case "${HEALTH}" in
                healthy|none)
                  READY=true
                  break
                  ;;
                unhealthy)
                  echo "Web container is unhealthy"
                  docker compose logs --tail=200 web
                  exit 1
                  ;;
              esac

              sleep 2
            done

            if [ "${READY}" != "true" ]; then
              echo "Container did not become ready in time"
              docker compose logs --tail=200 web
              exit 1
            fi

            # 7. HTTP Health Check (imported from remote repository commits)
            if [ -n "${HEALTHCHECK_URL:-}" ]; then
              log "Running HTTP health check on url: ${HEALTHCHECK_URL}"

              HEALTHCHECK_OK=false

              for attempt in $(seq 1 10); do
                if curl \
                  --fail \
                  --silent \
                  --show-error \
                  --location \
                  --max-time 10 \
                  "${HEALTHCHECK_URL}" \
                  --output /dev/null; then
                  HEALTHCHECK_OK=true
                  break
                fi

                echo "HTTP health check failed: ${attempt}/10"
                sleep 3
              done

              if [ "${HEALTHCHECK_OK}" != "true" ]; then
                echo "HTTP health check failed"
                docker compose logs --tail=200 web
                exit 1
              fi
            fi

            # 8. Post-deployment safe cleanup of old images to preserve disk space
            log "Performing safe post-deployment cleanup of old images..."
            docker image prune --force

            log "Deployment completed successfully!"
            docker compose ps web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
