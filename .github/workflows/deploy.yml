name: Odyssey Frontend Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: odyssey-production-deploy
  cancel-in-progress: true

env:
  PROJECT_PATH: /srv/blog
  RELEASE_PATH: /srv/blog/releases
  RELEASE_NAME: ${{ github.sha }}

jobs:
  deploy:
    name: Deploy Odyssey Web
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate repository
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Commit: $GITHUB_SHA"

          test -f compose.yaml || {
            echo "compose.yaml was not found"
            exit 1
          }

          test -f apps/web/Dockerfile || {
            echo "apps/web/Dockerfile was not found"
            exit 1
          }

      - name: Create deployment archive
        shell: bash
        run: |
          set -Eeuo pipefail

          mkdir -p .deploy

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='dist' \
            --exclude='coverage' \
            --exclude='.deploy' \
            -czf ".deploy/odyssey-${GITHUB_SHA}.tar.gz" \
            .

          ls -lh ".deploy/odyssey-${GITHUB_SHA}.tar.gz"

      - name: Prepare release directory
        uses: appleboy/ssh-action@v1.2.2
        env:
          RELEASE_PATH: ${{ env.RELEASE_PATH }}
          RELEASE_NAME: ${{ env.RELEASE_NAME }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: RELEASE_PATH,RELEASE_NAME
          command_timeout: 5m
          script: |
            set -Eeuo pipefail

            mkdir -p "${RELEASE_PATH}/${RELEASE_NAME}"
            mkdir -p "${RELEASE_PATH}/archives"

            rm -rf "${RELEASE_PATH:?}/${RELEASE_NAME:?}"
            mkdir -p "${RELEASE_PATH}/${RELEASE_NAME}"

      - name: Upload deployment archive
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: ".deploy/odyssey-${{ github.sha }}.tar.gz"
          target: "/srv/blog/releases/archives"
          strip_components: 1
          overwrite: true

      - name: Deploy release
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_SHA: ${{ github.sha }}
          PROJECT_PATH: ${{ env.PROJECT_PATH }}
          RELEASE_PATH: ${{ env.RELEASE_PATH }}
          RELEASE_NAME: ${{ env.RELEASE_NAME }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: DEPLOY_SHA,PROJECT_PATH,RELEASE_PATH,RELEASE_NAME,HEALTHCHECK_URL
          command_timeout: 30m
          script: |
            #!/usr/bin/env bash
            set -Eeuo pipefail

            log() {
              printf '\n[%s] %s\n' "$(date '+%Y-%m-%d %H:%M:%S')" "$*"
            }

            on_error() {
              local exit_code=$?
              local line_number="${1:-unknown}"

              echo
              echo "================================================"
              echo "Deployment failed"
              echo "Exit code : ${exit_code}"
              echo "Line      : ${line_number}"
              echo "Commit    : ${DEPLOY_SHA}"
              echo "================================================"

              if [ -d "${RELEASE_PATH}/${RELEASE_NAME}" ]; then
                cd "${RELEASE_PATH}/${RELEASE_NAME}" || true
                docker compose logs --tail=150 web 2>/dev/null || true
              fi

              exit "${exit_code}"
            }

            trap 'on_error $LINENO' ERR

            ARCHIVE="${RELEASE_PATH}/archives/odyssey-${DEPLOY_SHA}.tar.gz"
            RELEASE_DIR="${RELEASE_PATH}/${RELEASE_NAME}"
            CURRENT_LINK="${PROJECT_PATH}/current"

            log "Validating deployment package"

            test -f "${ARCHIVE}" || {
              echo "Deployment archive was not found:"
              echo "${ARCHIVE}"
              exit 1
            }

            command -v docker >/dev/null 2>&1 || {
              echo "Docker is not installed"
              exit 1
            }

            docker compose version >/dev/null 2>&1 || {
              echo "Docker Compose v2 is unavailable"
              exit 1
            }

            log "Extracting release"

            rm -rf "${RELEASE_DIR:?}"/*
            tar -xzf "${ARCHIVE}" -C "${RELEASE_DIR}"

            test -f "${RELEASE_DIR}/compose.yaml" || {
              echo "compose.yaml was not found after extraction"
              exit 1
            }

            test -f "${RELEASE_DIR}/apps/web/Dockerfile" || {
              echo "apps/web/Dockerfile was not found after extraction"
              exit 1
            }

            cd "${RELEASE_DIR}"

            log "Validating Docker Compose"

            docker compose config --quiet

            export COMPOSE_PARALLEL_LIMIT=1
            export BUILDKIT_STEP_LOG_MAX_SIZE=1048576

            log "Building web image"

            nice -n 10 docker compose build --pull web

            log "Starting web service"

            docker compose up \
              -d \
              --no-deps \
              web

            log "Verifying container"

            CONTAINER_ID="$(docker compose ps -q web)"

            if [ -z "${CONTAINER_ID}" ]; then
              echo "Web container ID could not be resolved"
              exit 1
            fi

            READY=false

            for attempt in $(seq 1 30); do
              RUNNING="$(
                docker inspect \
                  --format '{{.State.Running}}' \
                  "${CONTAINER_ID}"
              )"

              HEALTH="$(
                docker inspect \
                  --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' \
                  "${CONTAINER_ID}"
              )"

              echo "Check ${attempt}/30: running=${RUNNING}, health=${HEALTH}"

              if [ "${RUNNING}" != "true" ]; then
                echo "Web container stopped unexpectedly"
                docker compose logs --tail=200 web
                exit 1
              fi

              case "${HEALTH}" in
                healthy|none)
                  READY=true
                  break
                  ;;
                unhealthy)
                  echo "Web container is unhealthy"
                  docker compose logs --tail=200 web
                  exit 1
                  ;;
              esac

              sleep 2
            done

            if [ "${READY}" != "true" ]; then
              echo "Container did not become ready in time"
              docker compose logs --tail=200 web
              exit 1
            fi

            if [ -n "${HEALTHCHECK_URL:-}" ]; then
              log "Running HTTP health check"

              HEALTHCHECK_OK=false

              for attempt in $(seq 1 10); do
                if curl \
                  --fail \
                  --silent \
                  --show-error \
                  --location \
                  --max-time 10 \
                  "${HEALTHCHECK_URL}" \
                  --output /dev/null; then
                  HEALTHCHECK_OK=true
                  break
                fi

                echo "HTTP health check failed: ${attempt}/10"
                sleep 3
              done

              if [ "${HEALTHCHECK_OK}" != "true" ]; then
                echo "HTTP health check failed"
                docker compose logs --tail=200 web
                exit 1
              fi
            fi

            log "Activating release"

            ln -sfn "${RELEASE_DIR}" "${CURRENT_LINK}"

            printf '%s\n' "${DEPLOY_SHA}" > "${RELEASE_DIR}/DEPLOYED_COMMIT"

            log "Cleaning old releases"

            find "${RELEASE_PATH}" \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              -not -name archives \
              -printf '%T@ %p\n' \
              | sort -nr \
              | awk 'NR > 3 { print $2 }' \
              | xargs -r rm -rf

            find "${RELEASE_PATH}/archives" \
              -type f \
              -name 'odyssey-*.tar.gz' \
              -mtime +7 \
              -delete

            log "Cleaning Docker cache"

            docker image prune --force

            docker builder prune \
              --force \
              --filter "until=168h"

            log "Deployment completed successfully"

            echo "Commit    : ${DEPLOY_SHA}"
            echo "Release   : ${RELEASE_DIR}"
            echo "Container : ${CONTAINER_ID}"

            docker compose ps web
