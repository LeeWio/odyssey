name: Odyssey Frontend Deploy

on:
  push:
    branches: ["main"]

concurrency:
  group: odyssey-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # 1. Clear any leftover git lockfiles to unlock git operations on the server
            rm -f ${{ secrets.SERVER_PROJECT_PATH || '/srv/blog' }}/apps/web/.git/index.lock
            rm -f ${{ secrets.SERVER_PROJECT_PATH || '/srv/blog' }}/apps/web/.git/refs/remotes/origin/main.lock

            # 2. Navigate to the Web directory and force-sync with remote origin/main (with retry loop for network robustness)
            cd ${{ secrets.SERVER_PROJECT_PATH || '/srv/blog' }}/apps/web
            success=false
            for i in {1..5}; do
              echo "Fetching latest changes from GitHub (Attempt $i/5)..."
              if git fetch --all; then
                success=true
                break
              else
                echo "Git fetch failed. Retrying in 10 seconds..."
                sleep 10
              fi
            done
            if [ "$success" = false ]; then
              echo "WARNING: Git fetch failed after 5 attempts. Resetting to last available local origin/main."
            fi
            git reset --hard origin/main

            # 3. Navigate to the root directory containing compose.yaml
            cd ${{ secrets.SERVER_PROJECT_PATH || '/srv/blog' }}

            # 4. Limit build concurrency and resource usage to prevent server lockups/freezes during Next.js compilation
            export COMPOSE_PARALLEL_LIMIT=1
            export BUILDKIT_STEP_LOG_MAX_SIZE=1048576

            echo "Starting graceful, resource-limited Docker Compose build..."
            # Check if systemd-run is available on the server for strict cgroup resource constraints
            if command -v systemd-run >/dev/null 2>&1; then
              echo "Using systemd-run for strict CPU/Memory resource fencing (CPU: 120%, RAM: 1400M)..."
              if [ "$(id -u)" -eq 0 ]; then
                systemd-run --scope -p CPUQuota=120% -p MemoryMax=1400M nice -n 10 docker compose build web
              else
                sudo systemd-run --scope -p CPUQuota=120% -p MemoryMax=1400M nice -n 10 docker compose build web
              fi
            else
              echo "systemd-run not found. Falling back to nice -n 10 for CPU priority throttling..."
              nice -n 10 docker compose build web
            fi

            # 5. Rebuild and recreate only the Web container with zero-downtime rolling restart (no dependency cascading)
            docker compose up -d --no-deps web
